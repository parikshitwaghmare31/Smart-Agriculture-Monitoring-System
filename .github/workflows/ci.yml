name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------
  # ML pipeline: regenerate the dataset and retrain the model, then run a
  # quality gate so a regression in the training logic fails the build
  # instead of silently shipping a worse model.
  # ---------------------------------------------------------------------
  ml-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Generate dataset
        working-directory: ml/scripts
        run: python generate_dataset.py

      - name: Train model
        working-directory: ml/scripts
        run: python train_model.py

      - name: Quality gate on model metrics
        run: |
          python - <<'EOF'
          import json
          with open("ml/models/metrics.json") as f:
              metrics = json.load(f)
          acc = metrics["classifier"]["accuracy"]
          f1 = metrics["classifier"]["f1"]
          print(f"Classifier accuracy={acc:.3f} f1={f1:.3f}")
          assert acc >= 0.75, f"Classifier accuracy {acc:.3f} fell below the 0.75 quality gate"
          assert f1 >= 0.75, f"Classifier F1 {f1:.3f} fell below the 0.75 quality gate"
          EOF

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: irrigation-model
          path: |
            ml/models/irrigation_model.pkl
            ml/models/metrics.json
          retention-days: 14

  # ---------------------------------------------------------------------
  # Backend: install deps, run the ML pipeline output through it, then
  # run pytest smoke tests (no MongoDB/MQTT required — those are covered
  # by the Docker Compose stack, not unit CI).
  # ---------------------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest
    needs: ml-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: irrigation-model
          path: ml/models

      - name: Verify app imports cleanly
        working-directory: backend
        env:
          MODEL_PATH: ${{ github.workspace }}/ml/models/irrigation_model.pkl
          MQTT_ENABLED: "false"
        run: python -c "from app.main import app; print('App imported OK with', len(app.routes), 'routes')"

      - name: Run pytest
        working-directory: backend
        env:
          MODEL_PATH: ${{ github.workspace }}/ml/models/irrigation_model.pkl
          MQTT_ENABLED: "false"
        run: pytest tests/ -v

  # ---------------------------------------------------------------------
  # Frontend: install with the locked dependency tree and produce a
  # production build, catching build-breaking changes before merge.
  # ---------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build
        env:
          CI: true

  # ---------------------------------------------------------------------
  # Docker: confirm every Dockerfile in the stack actually builds. This
  # doesn't run the containers (no Mongo/Mosquitto in this job), it just
  # guards against a broken Dockerfile reaching main.
  # ---------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: ml-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: irrigation-model
          path: ml/models

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: smart-agri-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: smart-agri-frontend:ci

      - name: Build simulator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.simulator
          push: false
          tags: smart-agri-simulator:ci
