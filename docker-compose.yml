services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: smart-agri-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=smart_agriculture
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_TOPIC=farm/sensors
      - MQTT_USE_TLS=${MQTT_USE_TLS}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MODEL_PATH=/app/ml/models/irrigation_model.pkl
      - CORS_ORIGINS=*

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: smart-agri-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  iot-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    container_name: smart-agri-simulator
    restart: unless-stopped
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_TOPIC=farm/sensors
      - MQTT_USE_TLS=${MQTT_USE_TLS}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}