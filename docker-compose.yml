version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: smart-agri-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smart-agri-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: smart-agri-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=smart_agriculture
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=farm/sensors
      - MODEL_PATH=/app/ml/models/irrigation_model.pkl
      - CORS_ORIGINS=*
    depends_on:
      mongodb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: smart-agri-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  iot-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    container_name: smart-agri-simulator
    restart: unless-stopped
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - MQTT_TOPIC=farm/sensors
    depends_on:
      - mosquitto

volumes:
  mongo_data:
